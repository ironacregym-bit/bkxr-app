# .github/workflows/iron-acre-generate-recurring-sessions.yml
name: Iron Acre Generate Recurring Sessions

on:
  schedule:
    # 1st day of every month at 00:00 UTC
    # Example: 1 August generates all September sessions.
    - cron: "0 0 1 * *"
  workflow_dispatch: {}

jobs:
  call-generate-recurring-sessions:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Call recurring session generation endpoint
        env:
          CRON_URL: ${{ secrets.IRON_ACRE_GENERATE_RECURRING_SESSIONS_URL }}
          CRON_KEY: ${{ secrets.CRON_KEY }}
        run: |
          echo "Calling $CRON_URL ..."
          http_code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "$CRON_URL" \
            -H "x-cron-key: $CRON_KEY" \
            -H "Content-Type: application/json" \
            --data '{}')

          echo "HTTP $http_code"
          cat /tmp/resp.json || true

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi
