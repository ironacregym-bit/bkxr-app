# .github/workflows/iron-acre-friday-checkin-reminder.yml
name: Iron Acre Friday Check-in Reminder

on:
  schedule:
    # Every Friday at 17:00 UTC
    - cron: "0 17 * * 5"
  workflow_dispatch: {}

jobs:
  call-friday-checkin-reminder:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Call Friday check-in reminder endpoint
        env:
          CRON_URL: ${{ secrets.IRON_ACRE_FRIDAY_CHECKIN_REMINDER_URL }}
          CRON_KEY: ${{ secrets.CRON_KEY }}
        run: |
          echo "Calling $CRON_URL ..."
          http_code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "$CRON_URL" \
            -H "x-cron-key: $CRON_KEY" \
            -H "Content-Type: application/json" \
            --data '{}')

          echo "HTTP $http_code"
          cat /tmp/resp.json || true

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi
